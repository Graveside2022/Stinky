<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kismet Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        html {
            height: 100%;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #030610;
            color: #d0d8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                linear-gradient(45deg, rgba(0, 200, 220, 0.02) 25%, transparent 25%, transparent 75%, rgba(0, 200, 220, 0.02) 75%),
                linear-gradient(-45deg, rgba(0, 200, 220, 0.02) 25%, transparent 25%, transparent 75%, rgba(0, 200, 220, 0.02) 75%);
            background-size: 70px 70px;
            z-index: -2;
            opacity: 0.4;
            animation: background-pan 80s linear infinite;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle fill="%23203050" cx="10" cy="10" r="0.3"/><circle fill="%23203050" cx="30" cy="30" r="0.2"/><circle fill="%23203050" cx="50" cy="50" r="0.4"/><circle fill="%23203050" cx="70" cy="70" r="0.1"/><circle fill="%23203050" cx="90" cy="90" r="0.3"/><circle fill="%23203050" cx="10" cy="90" r="0.2"/><circle fill="%23203050" cx="90" cy="10" r="0.4"/><circle fill="%23203050" cx="50" cy="10" r="0.1"/><circle fill="%23203050" cx="10" cy="50" r="0.3"/><circle fill="%23203050" cx="30" cy="70" r="0.2"/><circle fill="%23203050" cx="70" cy="30" r="0.3"/></svg>');
            background-size: 100px 100px;
            opacity: 0.08;
            z-index: -1;
            }

        @keyframes background-pan {
            0% { background-position: 0% 0%; }
            100% { background-position: 1200px 1200px; }
        }

        .top-banner {
            width: 100%;
            background-color: rgba(10, 15, 30, 0.75);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0, 220, 255, 0.4);
            box-shadow: 0 2px 20px rgba(0, 220, 255, 0.35);
            padding: 12px 25px;
            text-align: center;
            box-sizing: border-box;
            flex-shrink: 0;
            z-index: 10;
        }

        .top-banner h1 {
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.8em;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 0 8px #00d2ff, 0 0 15px #00d2ff, 0 0 25px rgba(0, 200, 220, 0.7);
            animation: pulse-glow-banner 2.5s infinite alternate;
        }

        @keyframes pulse-glow-banner {
            from { text-shadow: 0 0 8px #00d2ff, 0 0 15px #00d2ff, 0 0 25px rgba(0, 200, 220, 0.7); opacity: 0.9; }
            to { text-shadow: 0 0 12px #00e2ff, 0 0 22px #00e2ff, 0 0 35px rgba(0, 220, 255, 0.9); opacity: 1; }
        }

        .main-content-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            flex-grow: 1;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .control-panel {
            background-color: rgba(12, 22, 48, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 190, 215, 0.35);
            box-shadow: inset 0 0 12px rgba(0, 220, 255, 0.15), 0 0 10px rgba(0, 150, 180, 0.1);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .status-panel {
            background-color: rgba(12, 22, 48, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 190, 215, 0.35);
            box-shadow: inset 0 0 12px rgba(0, 220, 255, 0.15), 0 0 10px rgba(0, 150, 180, 0.1);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-title {
            color: #a0e0ff;
            border-bottom: 1px solid rgba(0, 200, 220, 0.3);
            padding-bottom: 8px;
            margin: 0;
            letter-spacing: 1.5px;
            font-weight: 500;
            font-size: 1.1em;
            text-shadow: 0 0 5px rgba(0, 200, 220, 0.3);
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .control-button {
            background: linear-gradient(90deg, #00d2ff 0%, #222 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 1em;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 210, 255, 0.15);
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
        }

        .control-button:hover {
            background: linear-gradient(90deg, #222 0%, #00d2ff 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 210, 255, 0.25);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            }

        .status-dot.active {
            background: #44ff44;
            box-shadow: 0 0 10px #44ff44;
            }

        .status-text {
            font-size: 0.9em;
            color: #d0d8f0;
            }

        .back-button {
            background: linear-gradient(90deg, #00d2ff 0%, #222 100%);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 0.9em 2.2em;
            font-size: 1.1em;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 210, 255, 0.15);
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            outline: none;
            position: relative;
            overflow: hidden;
            margin-top: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .back-button:hover {
            background: linear-gradient(90deg, #222 0%, #00d2ff 100%);
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 8px 32px rgba(0, 210, 255, 0.25);
        }
    </style>
</head>
<body>
    <div class="top-banner">
        <h1>Kismet Control</h1>
    </div>
    <div class="main-content-area">
        <div class="control-panel">
            <h2 class="panel-title">Control Panel</h2>
            <div class="button-group">
                <button class="control-button" onclick="startKismet()">Start Kismet</button>
                <button class="control-button" onclick="stopKismet()">Stop Kismet</button>
                <a href="http://10.42.0.1:2501" class="control-button" target="_blank">Open Kismet Web UI</a>
                <a href="http://10.42.0.1:8000" class="control-button" target="_blank">Open WigletoTak</a>
            </div>
        </div>
        <div class="status-panel">
            <h2 class="panel-title">Status</h2>
            <div class="status-indicator">
                <div class="status-dot" id="kismet-status"></div>
                <span class="status-text">Kismet Service</span>
            </div>
            <div class="status-indicator">
                <div class="status-dot" id="wlan2-status"></div>
                <span class="status-text">wlan2 Interface</span>
            </div>
        </div>
    </div>
    <button class="back-button" onclick="window.location.href='hi.html'">← Back to Main</button>

    <script>
        function startKismet() {
            fetch('http://10.42.0.1:5000/run-script', {method: 'POST'})
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        alert('Kismet started successfully!');
                        updateStatus();
                    } else {
                        alert('Error: ' + data.message);
                    }
                })
                .catch(err => {
                    alert('Request failed: ' + err);
                });
        }

        function stopKismet() {
            fetch('http://10.42.0.1:5000/stop-script', {method: 'POST'})
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        alert('Kismet stopped successfully!');
                        updateStatus();
                    } else {
                        alert('Error: ' + data.message);
                    }
                })
                .catch(err => {
                    alert('Request failed: ' + err);
                });
        }

        function updateStatus() {
            // Update Kismet status
            fetch('http://10.42.0.1:5000/status')
                .then(response => response.json())
                .then(data => {
                    const kismetStatus = document.getElementById('kismet-status');
                    const wlan2Status = document.getElementById('wlan2-status');
                    
                    if(data.kismet_running) {
                        kismetStatus.classList.add('active');
                    } else {
                        kismetStatus.classList.remove('active');
                    }
                    
                    if(data.wlan2_monitor) {
                        wlan2Status.classList.add('active');
                    } else {
                        wlan2Status.classList.remove('active');
                    }
                })
                .catch(err => console.error('Status update failed:', err));
        }

        // Update status every 5 seconds
        setInterval(updateStatus, 5000);
        // Initial status update
        updateStatus();
    </script>
</body>
</html>
