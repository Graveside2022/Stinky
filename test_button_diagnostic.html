<!DOCTYPE html>
<html>
<head>
    <title>Button Diagnostic</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: #1a1a1a;
            color: #fff;
        }
        button { 
            padding: 15px 30px; 
            margin: 10px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .control-button {
            background: linear-gradient(90deg, #00d2ff 0%, #222 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 1em;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 210, 255, 0.15);
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
        }
        .log { 
            margin: 20px 0; 
            padding: 15px; 
            background: #2a2a2a; 
            border-radius: 5px; 
            border: 1px solid #444;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Button Click Diagnostic</h1>
    
    <div>
        <h2>Test Button (same as in hi.html)</h2>
        <button class="control-button" data-action="startKismet">Start Kismet</button>
        <button class="control-button" onclick="directStartKismet()">Start Kismet (Direct)</button>
    </div>
    
    <div class="log" id="log">Waiting for button clicks...</div>
    
    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        // Event delegation (like in hi.html)
        document.addEventListener('click', function(e) {
            log(`Click event on: ${e.target.tagName} class="${e.target.className}"`);
            
            const action = e.target.getAttribute('data-action');
            log(`data-action attribute: ${action}`);
            
            if (!action) {
                log('No data-action attribute found');
                return;
            }
            
            if (action === 'startKismet') {
                log('startKismet action detected!');
                startKismet();
            }
        });
        
        // Direct function call
        async function directStartKismet() {
            log('directStartKismet called');
            startKismet();
        }
        
        // The actual startKismet function
        async function startKismet() {
            log('startKismet function called');
            
            try {
                log('Attempting to call /api/start-script endpoint');
                const response = await fetch('/api/start-script', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ scriptName: 'gps_kismet_wigle.sh' })
                });
                
                log(`Response received: ${response.status} ${response.statusText}`);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    log(`Response not OK: ${errorText}`);
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                log(`Response data: ${JSON.stringify(data, null, 2)}`);
                
                if(data.success === true) {
                    log('✓ Script started successfully!');
                    log(`Process ID: ${data.processId}`);
                } else {
                    log('✗ Script failed to start');
                }
            } catch (error) {
                log(`✗ Error in startKismet: ${error.message}`);
                log(`Error stack: ${error.stack}`);
            }
        }
        
        // Log page info
        log(`Current page URL: ${window.location.href}`);
        log(`Origin: ${window.location.origin}`);
        log(`API endpoint will be: ${window.location.origin}/api/start-script`);
    </script>
</body>
</html>
