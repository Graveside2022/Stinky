<!DOCTYPE html>
<html>
<head>
    <title>Start Button Debug Test</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: #1a1a1a;
            color: #fff;
        }
        button { 
            padding: 15px 30px; 
            margin: 10px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        .log { 
            margin: 20px 0; 
            padding: 15px; 
            background: #2a2a2a; 
            border-radius: 5px; 
            border: 1px solid #444;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .info { color: #2196F3; }
        .warning { color: #ff9800; }
    </style>
</head>
<body>
    <h1>Start Button Debug Test</h1>
    
    <div>
        <button onclick="testDirectAPI()">Test Direct API Call</button>
        <button onclick="testWithProxy()">Test With Proxy URL</button>
        <button onclick="testOldEndpoint()">Test Old /run-script</button>
        <button onclick="checkStatus()">Check Status</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>
    
    <div class="log" id="log">Ready for testing...</div>
    
    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = type;
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = 'Log cleared. Ready for testing...';
        }
        
        async function testDirectAPI() {
            log('Testing direct API call to /api/start-script...', 'info');
            try {
                const url = 'http://localhost:8002/api/start-script';
                log(`URL: ${url}`, 'info');
                log('Body: {"scriptName":"gps_kismet_wigle.sh"}', 'info');
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ scriptName: 'gps_kismet_wigle.sh' })
                });
                
                log(`Response status: ${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                log(`Response data: ${JSON.stringify(data, null, 2)}`, response.ok ? 'success' : 'error');
                
                if (data.success) {
                    log('✓ Script started successfully!', 'success');
                    log(`Process ID: ${data.processId}`, 'info');
                } else {
                    log('✗ Script failed to start', 'error');
                }
            } catch (error) {
                log(`✗ Error: ${error.message}`, 'error');
                log(`Error details: ${error.stack}`, 'error');
            }
        }
        
        async function testWithProxy() {
            log('Testing with proxy URL (relative path)...', 'info');
            try {
                const url = '/api/start-script';  // Relative URL
                log(`URL: ${url} (will resolve to ${window.location.origin}${url})`, 'info');
                log('Body: {"scriptName":"gps_kismet_wigle.sh"}', 'info');
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ scriptName: 'gps_kismet_wigle.sh' })
                });
                
                log(`Response status: ${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                log(`Response data: ${JSON.stringify(data, null, 2)}`, response.ok ? 'success' : 'error');
                
                if (data.success) {
                    log('✓ Script started successfully!', 'success');
                    log(`Process ID: ${data.processId}`, 'info');
                } else {
                    log('✗ Script failed to start', 'error');
                }
            } catch (error) {
                log(`✗ Error: ${error.message}`, 'error');
                log(`Error details: ${error.stack}`, 'error');
            }
        }
        
        async function testOldEndpoint() {
            log('Testing old /run-script endpoint...', 'info');
            try {
                const url = '/run-script';
                log(`URL: ${url}`, 'info');
                log('Body: {} (empty)', 'info');
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                });
                
                log(`Response status: ${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                log(`Response data: ${JSON.stringify(data, null, 2)}`, response.ok ? 'success' : 'error');
                
                if (data.status === 'success') {
                    log('✓ Script started successfully!', 'success');
                } else {
                    log('✗ Script failed to start', 'error');
                }
            } catch (error) {
                log(`✗ Error: ${error.message}`, 'error');
            }
        }
        
        async function checkStatus() {
            log('Checking script status...', 'info');
            try {
                const response = await fetch('/script-status');
                const data = await response.json();
                log(`Status response: ${JSON.stringify(data, null, 2)}`, 'info');
                
                if (data.kismet_running) {
                    log('✓ Kismet is running', 'success');
                } else {
                    log('✗ Kismet is not running', 'warning');
                }
                
                if (data.wigle_running) {
                    log('✓ WigleToTAK is running', 'success');
                } else {
                    log('✗ WigleToTAK is not running', 'warning');
                }
                
                if (data.gps_running) {
                    log('✓ GPS is running', 'success');
                } else {
                    log('✗ GPS is not running', 'warning');
                }
            } catch (error) {
                log(`✗ Error checking status: ${error.message}`, 'error');
            }
        }
        
        // Log current page location
        log(`Current page URL: ${window.location.href}`, 'info');
        log(`Origin: ${window.location.origin}`, 'info');
        log(`Expected API URL: ${window.location.origin}/api/start-script`, 'info');
    </script>
</body>
</html>
